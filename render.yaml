services:
  - type: web
    name: workshop-attendance
    runtime: node
    plan: starter
    buildCommand: cd du-an-moi && npm install
    startCommand: cd du-an-moi && npm start
    autoDeployTrigger: commit
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: HOST
        value: 0.0.0.0
      - key: DATA_DIR
        value: /var/data
    disk:
      name: attendance-data
      mountPath: /var/data
